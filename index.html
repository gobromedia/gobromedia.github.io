<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBRO MEDIA | Premium Digital Agency</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-color: #ffffff;
            --gold-gradient: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-solid: #D4AF37;
            --gold-dark: #8B7328;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- GOLD TEXT EFFECT --- */
        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold-gradient);
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--gold-solid);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('../images/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 0 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 100%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 20px;
            line-height: 1.1;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-gold {
            padding: 15px 40px;
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-outline {
            padding: 15px 40px;
            background: transparent;
            color: var(--gold-solid);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 2px solid var(--gold-solid);
            margin-left: 15px;
        }

        .btn-outline:hover {
            background: var(--gold-solid);
            color: #000;
        }

        /* --- STATS SECTION --- */
        .stats {
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 60px 10%;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            position: relative;
        }

        .stats::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-solid), transparent);
        }

        .stat-item {
            text-align: center;
            margin: 20px;
            padding: 20px;
            min-width: 150px;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--gold-solid);
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .stat-label {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: #fff;
            margin-top: 10px;
        }

        /* --- SERVICES SECTION --- */
        .section {
            padding: 100px 10%;
            position: relative;
        }

        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--gold-gradient);
            margin: 20px auto 0;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid #222;
            border-radius: 15px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent);
            opacity: 0;
            transition: 0.4s;
        }

        .service-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold-gradient);
            transform: scaleX(0);
            transition: 0.4s;
            transform-origin: left;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold-solid);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card:hover::after {
            transform: scaleX(1);
        }

        .service-card i {
            font-size: 50px;
            color: var(--gold-solid);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .service-card:hover i {
            transform: scale(1.1);
        }

        .service-card h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            color: #fff;
        }

        .service-card p {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* --- PORTFOLIO SECTION --- */
        .portfolio {
            background: #0a0a0a;
            padding: 100px 10%;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .portfolio-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .portfolio-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: 0.4s;
        }

        .portfolio-item:hover img {
            transform: scale(1.1);
        }

        .portfolio-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            transform: translateY(100%);
            transition: 0.4s;
        }

        .portfolio-item:hover .portfolio-overlay {
            transform: translateY(0);
        }

        .portfolio-overlay h4 {
            color: var(--gold-solid);
            margin-bottom: 5px;
        }

        .portfolio-overlay p {
            color: #ccc;
            font-size: 0.9rem;
        }

        /* --- ABOUT SECTION --- */
        .about {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image img {
            width: 100%;
            border-radius: 15px;
            border: 2px solid var(--gold-solid);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .about-image::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            width: 100%;
            height: 100%;
            border: 2px solid var(--gold-solid);
            border-radius: 15px;
            z-index: -1;
        }

        .about-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .about-content p {
            color: #aaa;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .about-features {
            list-style: none;
            margin-top: 30px;
        }

        .about-features li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #ccc;
        }

        .about-features i {
            color: var(--gold-solid);
        }

        /* --- CONTACT SECTION --- */
        .contact {
            padding: 100px 10%;
            background
